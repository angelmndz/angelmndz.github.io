<script type="text/javascript">
  $(".owl-carousel").owlCarousel({
    loop: true,
    margin: 0,
    navText: [],
    center: true,
    autoplay: true,
    autoplayHoverPause: true,
    responsive: {
      0: {
        items: 1
      },
      1000: {
        items: 3
      }
    }
  });

  ScrollReveal().reveal('.img-box img', {
    origin: 'bottom',
    distance: '100px',
    duration: 1000,
    easing: 'ease-out',
    reset: false,
    beforeReveal: function (el) {
      el.classList.add('visible');
    }
  });

  ScrollReveal().reveal('.info_section', {
    origin: 'bottom',
    distance: '100px',
    duration: 500,

    }
  });
