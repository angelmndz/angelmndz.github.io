<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DriveControl - Control de Mantenimiento Vehicular</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="script.js"></script>

</head>
<body>

    <header class="header">
        <h1>DriveControl</h1>
        <p>Control de Mantenimiento Vehicular</p>
    </header>

    <main class="main-content">
        <div class="action-bar">
            <h2 class="section-title">Mis Vehículos</h2>
            <button class="add-vehicle-btn" onclick="openAddVehicleModal()">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5v14"/></svg>
                Agregar Vehículo
            </button>
        </div>

        <div class="vehicles-container" id="vehicles-list">
            <p class="info-message">No hay vehículos registrados. Haz clic en "Agregar Vehículo" para empezar a registrar.</p>
            </div>

        </main>
</body>
</html>
