<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DriveControl - Control de Mantenimiento Vehicular</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap">
    <!-- Íconos de Material Design -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <!-- Contenedor principal que ahora ocupa toda la pantalla -->
    <div class="app-container">
        
        <!-- Encabezado de la aplicación (Header) -->
        <header class="header">
            <h1 class="title">DriveControl</h1>
            <p class="subtitle">Control de Mantenimiento Vehicular</p>
        </header>

        <!-- Contenido Principal (Main) -->
        <main class="content">
            <div class="section-header">
                <h2 class="section-title">Mis Vehículos</h2>
                <span class="registration-count">2 registrados</span>
            </div>

            <div id="vehicle-list" class="vehicle-list">
                <!-- Tarjeta de Vehículo 1: Honda Civic -->
                <div class="vehicle-card" data-vehicle-id="1">
                    <div class="vehicle-info-left">
                        <span class="material-icons vehicle-icon">directions_car</span>
                    </div>
                    <div class="vehicle-details">
                        <div class="vehicle-header">
                            <h3 class="vehicle-name">Honda Civic</h3>
                            <span class="material-icons arrow">chevron_right</span>
                        </div>
                        <p class="vehicle-model-plate">2020 • ABC-123</p>
                        <p class="vehicle-mileage">24.500 km</p>
                        <span class="maintenance-tag next-maintenance">Próximo: 25.000 km</span>
                    </div>
                </div>

                <!-- Tarjeta de Vehículo 2: Yamaha FZ 150 -->
                <div class="vehicle-card" data-vehicle-id="2">
                    <div class="vehicle-info-left">
                        <span class="material-icons vehicle-icon">two_wheeler</span>
                    </div>
                    <div class="vehicle-details">
                        <div class="vehicle-header">
                            <h3 class="vehicle-name">Yamaha FZ 150</h3>
                            <span class="material-icons arrow">chevron_right</span>
                        </div>
                        <p class="vehicle-model-plate">2019 • XYZ-456</p>
                        <p class="vehicle-mileage">7800 km</p>
                        <span class="maintenance-tag next-maintenance">Próximo: 8000 km</span>
                    </div>
                </div>
            </div>
            
            <!-- Simulamos que el botón es parte de un footer o una sección inferior fija, pero lo dejamos en main para simplicidad de la estructura -->
            <!-- Si quisieras un footer fijo en la parte inferior, necesitarías Flexbox en el body/app-container -->
        </main>
        
        <!-- Botón Agregar Vehículo (Como si fuera el pie/acción principal) -->
        <div class="app-footer">
            <button class="add-vehicle-btn" id="add-vehicle-btn">
                <span class="material-icons">add_circle_outline</span>
                Agregar Vehículo
            </button>
        </div>
    </div>
    
    <!-- Incluimos el script simple para la interactividad -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const addVehicleBtn = document.getElementById('add-vehicle-btn');
            const vehicleCards = document.querySelectorAll('.vehicle-card');

            if (addVehicleBtn) {
                addVehicleBtn.addEventListener('click', () => {
                    console.log('Navegar a Agregar Vehículo');
                    // Usar un modal en lugar de alert()
                    alert('¡Acción: Agregar nuevo vehículo!');
                });
            }

            vehicleCards.forEach(card => {
                card.addEventListener('click', () => {
                    const vehicleName = card.querySelector('.vehicle-name').textContent;
                    console.log(`Navegar a detalles de: ${vehicleName}`);
                    // Usar un modal en lugar de alert()
                    alert(`¡Acción: Ver detalles de ${vehicleName}!`);
                });
            });
        });
    </script>
</body>
</html>
