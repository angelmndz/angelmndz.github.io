<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VibetuHogar - Iniciar Sesión</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;800&display=swap" rel="stylesheet">

<style>
  /* --- Variables de Color VibetuHogar --- */
  :root {
    --vh-dark-blue: #0d3b66;
    --vh-teal: #36909a;
    --vh-cyan: #65f0ca;
    --vh-bg-light: #f4f8fb;
    --vh-white: #ffffff;
    --vh-border: #d1dce5;

    /* Colores para las figuras del fondo animado (tonos suaves de la marca) */
    --shape-color-1: rgba(13, 59, 102, 0.08); /* Azul oscuro translúcido */
    --shape-color-2: rgba(54, 144, 154, 0.15); /* Teal translúcido */
    --shape-color-3: rgba(101, 240, 202, 0.2);  /* Cian translúcido */
    --shape-color-4: rgba(20, 82, 119, 0.1);  /* Azul intermedio */
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: 'Montserrat', sans-serif;
  }

  body {
    background-color: var(--vh-bg-light);
    overflow: hidden; 
    height: 100vh;
    width: 100vw;
  }

  /* =========================================
     1. PANTALLA DE CARGA (VibetuHogar)
     ========================================= */
  #preloader {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background-color: var(--vh-bg-light);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 2000;
    transition: opacity 0.8s ease-in-out, visibility 0.8s;
  }

  #preloader.hidden {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  .logo-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
  }

  .glow-effect {
    position: absolute;
    top: 10%;
    width: 120px;
    height: 120px;
    background: radial-gradient(circle, rgba(92,237,196,0.3) 0%, rgba(255,255,255,0) 70%);
    border-radius: 50%;
    z-index: 0;
    animation: pulseGlow 2s infinite alternate ease-in-out;
  }

  .logo-svg {
    width: 150px;
    height: 150px;
    z-index: 1;
    filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.05));
  }

  .draw-path {
    stroke-dasharray: 300;
    stroke-dashoffset: 300;
    animation: draw 2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }

  .logo-title {
    color: var(--vh-dark-blue);
    font-size: 2.2rem;
    font-weight: 800;
    margin-top: 10px;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeInUp 0.8s ease 1.5s forwards;
    z-index: 1;
  }

  .logo-subtitle {
    color: #555;
    font-size: 0.95rem;
    font-weight: 500;
    text-align: center;
    line-height: 1.4;
    margin-top: 5px;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeInUp 0.8s ease 1.8s forwards;
    z-index: 1;
  }

  @keyframes draw { to { stroke-dashoffset: 0; } }
  @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
  @keyframes pulseGlow { from { transform: scale(1); opacity: 0.5; } to { transform: scale(1.5); opacity: 1; } }


  /* =========================================
     2. FONDO ANIMADO GEOMÉTRICO
     ========================================= */
  .animated-background { 
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
    overflow: hidden; z-index: 1; opacity: 0; transition: opacity 1s ease-in; 
  }
  .animated-background.visible { opacity: 1; }
  
  /* Sutil degradado claro para darle profundidad al fondo */
  .gradient-overlay { 
    position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
    background: radial-gradient(circle at center, transparent 0%, rgba(209, 220, 229, 0.4) 100%); 
    z-index: 5; animation: pulse-overlay 10s infinite alternate; 
  }
  @keyframes pulse-overlay { 0% { opacity: 0.5; } 100% { opacity: 1; } }
  
  .shape { position: absolute; filter: blur(1px); }
  
  .diamond { width: 50px; height: 50px; background: var(--shape-color-1); animation: rotateShape 20s infinite linear; }
  .ring { width: 70px; height: 70px; border-radius: 50%; border: 6px solid var(--shape-color-2); background: transparent; animation: pulseShape 15s infinite alternate; }
  .hexagon { width: 60px; height: 65px; background: var(--shape-color-3); clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); animation: floatShape 12s infinite ease-in-out; }
  .pill { width: 90px; height: 35px; background: var(--shape-color-4); border-radius: 20px; animation: slideShape 18s infinite linear; }

  @keyframes rotateShape { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  @keyframes pulseShape { 0% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(1); opacity: 0.5; } }
  @keyframes floatShape { 0% { transform: translateY(0px) translateX(0px) rotate(0deg); } 50% { transform: translateY(-30px) translateX(30px) rotate(180deg); } 100% { transform: translateY(0px) translateX(0px) rotate(360deg); } }
  @keyframes slideShape { 0% { transform: translateX(-150px) rotate(0deg); } 50% { transform: translateX(150px) rotate(180deg); } 100% { transform: translateX(-150px) rotate(360deg); } }

  .particles { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; }
  .particle { position: absolute; width: 3px; height: 3px; background-color: var(--vh-teal); border-radius: 50%; opacity: 0.2; animation: sparkle 8s infinite linear; }
  @keyframes sparkle { 0% { opacity: 0; transform: scale(0.5); } 50% { opacity: 0.5; transform: scale(1.5); } 100% { opacity: 0; transform: scale(0.5); } }


  /* =========================================
     3. PANEL DE INICIO DE SESIÓN
     ========================================= */
  .auth-screen {
    position: relative;
    z-index: 10;
    opacity: 0;
    transform: translateY(30px);
    transition: opacity 0.6s ease-out, transform 0.6s ease-out;
    display: none;
    width: 100%;
    height: 100vh;
    overflow-y: auto; 
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  .auth-screen.visible { opacity: 1; transform: translateY(0); display: flex; }

  .auth-panel { 
    background: rgba(255, 255, 255, 0.85); 
    width: 100%; 
    max-width: 420px; 
    border-radius: 16px; 
    box-shadow: 0 15px 35px rgba(13, 59, 102, 0.1); 
    backdrop-filter: blur(12px); 
    border: 1px solid rgba(255, 255, 255, 0.5);
  }
  
  .form-container { padding: 45px 40px; }
  
  .form-title { 
    font-size: 28px; 
    color: var(--vh-dark-blue); 
    font-weight: 800; 
    margin-bottom: 35px; 
    text-align: center; 
  }
  
  .input-group { margin-bottom: 22px; display: flex; flex-direction: column; }
  
  .input-label { 
    font-size: 12px; 
    font-weight: 700; 
    color: var(--vh-teal); 
    text-transform: uppercase; 
    letter-spacing: 0.1em; 
    margin-bottom: 8px; 
  }
  
  .input-field { 
    font-size: 15px; 
    padding: 14px 16px; 
    border: 2px solid var(--vh-border); 
    border-radius: 8px; 
    background-color: var(--vh-white); 
    color: var(--vh-dark-blue);
    transition: all 0.3s ease; 
  }
  
  .input-field:focus { 
    outline: none; 
    border-color: var(--vh-teal); 
    box-shadow: 0 0 0 4px rgba(54, 144, 154, 0.15); 
  }
  
  .btn-submit { 
    font-size: 14px; 
    font-weight: 700; 
    text-transform: uppercase; 
    letter-spacing: 0.15em; 
    color: var(--vh-dark-blue); 
    /* Degradado del cian al teal para el botón */
    background: linear-gradient(135deg, var(--vh-cyan) 0%, var(--vh-teal) 100%); 
    border: none; 
    padding: 16px; 
    border-radius: 8px; 
    width: 100%; 
    cursor: pointer; 
    transition: transform 0.2s, box-shadow 0.2s; 
    margin-top: 15px; 
  }
  
  .btn-submit:hover { 
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(54, 144, 154, 0.3);
  }
  
  .btn-submit:active { transform: scale(0.98); }

</style>
</head>
<body>

  <div class="preloader" id="preloader">
    <div class="logo-container">
        <div class="glow-effect"></div>
        <svg viewBox="0 0 100 100" class="logo-svg">
            <defs>
                <linearGradient id="logoGrad" x1="0%" y1="100%" x2="100%" y2="0%">
                    <stop offset="0%" style="stop-color:#145277;stop-opacity:1" />
                    <stop offset="50%" style="stop-color:#36909a;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#65f0ca;stop-opacity:1" />
                </linearGradient>
            </defs>
            <path class="draw-path" d="M 50 20 L 15 45 L 15 80 L 45 80" fill="none" stroke="url(#logoGrad)" stroke-width="4" stroke-linejoin="round" stroke-linecap="round"/>
            <path class="draw-path" d="M 50 20 L 85 45 L 85 80 L 70 80" fill="none" stroke="url(#logoGrad)" stroke-width="4" stroke-linejoin="round" stroke-linecap="round"/>
            <path class="draw-path" d="M 25 38 L 25 20 L 32 20 L 32 33" fill="none" stroke="url(#logoGrad)" stroke-width="4" stroke-linejoin="round" stroke-linecap="round"/>
            <circle class="draw-path" cx="50" cy="55" r="4" fill="none" stroke="url(#logoGrad)" stroke-width="3"/>
            <circle class="draw-path" cx="50" cy="55" r="11" fill="none" stroke="url(#logoGrad)" stroke-width="3"/>
            <circle class="draw-path" cx="50" cy="55" r="18" fill="none" stroke="url(#logoGrad)" stroke-width="3"/>
            <path class="draw-path" d="M 50 55 L 85 20 M 70 20 L 85 20 L 85 35" fill="none" stroke="url(#logoGrad)" stroke-width="4" stroke-linejoin="round" stroke-linecap="round"/>
            <path class="draw-path" d="M 62 67 L 78 82" fill="none" stroke="url(#logoGrad)" stroke-width="4" stroke-linecap="round"/>
        </svg>
        <h1 class="logo-title">VibetuHogar</h1>
        <p class="logo-subtitle">Espacios que inspiran,<br>hogares que vibran.</p>
    </div>
  </div>

  <div class="animated-background" id="animatedBackground">
    <div class="geometric-shapes" id="geometricShapes"></div>
    <div class="particles" id="particles"></div>
    <div class="gradient-overlay"></div>
  </div>

  <div class="auth-screen" id="authScreen">
    <div class="auth-panel">
      <form class="form-container login-form" onsubmit="return false;">
        <h2 class="form-title">Bienvenido</h2>
        
        <div class="input-group">
          <label class="input-label" for="loginEmail">Correo electrónico</label>
          <input type="email" id="loginEmail" class="input-field" placeholder="ejemplo@vibetu.com" required>
        </div>

        <div class="input-group">
          <label class="input-label" for="loginPassword">Contraseña</label>
          <input type="password" id="loginPassword" class="input-field" placeholder="********" required>
        </div>

        <button type="submit" class="btn-submit">Ingresar</button>
      </form>
    </div>
  </div>

  <script>
    // Tiempo para que termine de dibujarse el logo antes de pasar al login
    const LOADING_DURATION = 4200; 

    function createGeometricShapes() {
      const container = document.getElementById('geometricShapes');
      const shapeTypes = ['diamond', 'ring', 'hexagon', 'pill'];
      const numShapes = 25; // Reduje un poco la cantidad para que se vea más limpio

      for (let i = 0; i < numShapes; i++) {
        const shape = document.createElement('div');
        const shapeClass = shapeTypes[Math.floor(Math.random() * shapeTypes.length)];
        shape.className = `shape ${shapeClass}`;
        
        shape.style.left = `${Math.random() * 100}%`;
        shape.style.top = `${Math.random() * 100}%`;
        shape.style.animationDelay = `${Math.random() * 15}s`;
        shape.style.animationDuration = `${Math.random() * 10 + 10}s`;
        
        container.appendChild(shape);
      }
    }

    function createParticles() {
      const container = document.getElementById('particles');
      const numParticles = 60;

      for (let i = 0; i < numParticles; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        
        particle.style.left = `${Math.random() * 100}%`;
        particle.style.top = `${Math.random() * 100}%`;
        particle.style.animationDelay = `${Math.random() * 8}s`;
        particle.style.animationDuration = `${Math.random() * 4 + 4}s`;
        
        container.appendChild(particle);
      }
    }

    window.addEventListener('load', () => {
      const preloader = document.getElementById('preloader');
      const authScreen = document.getElementById('authScreen');
      const animatedBackground = document.getElementById('animatedBackground');

      createGeometricShapes();
      createParticles();

      // Transición del loader al login
      setTimeout(() => {
        preloader.classList.add('hidden');
        animatedBackground.classList.add('visible');
        
        setTimeout(() => {
          authScreen.classList.add('visible');
          document.body.style.overflow = 'auto'; 
        }, 800); 

      }, LOADING_DURATION);
    });
  </script>

</body>
</html>
