<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f5f5f5;
        }
        .container {
            display: flex;
            justify-content: space-between;
            width: 900px;
        }
        .box {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            width: 45%;
        }
        section h1 {
            text-align: center;
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #00a0e3;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        .contact-info p {
            margin: 10px 0;
        }
        .contact-info a {
            text-decoration: none;
            color: #00a0e3;
        }
        .social-links a {
            margin-right: 10px;
            text-decoration: none;
            color: #00a0e3;
        }
    </style>
</head>
<body>

    <div class="container">
        <section class="box contact-form">
            <h1>Contacto</h1>
            <form action="your-action-url" method="post">
                <label for="name">Nombre</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>

                <label for="subject">Asunto</label>
                <select id="subject" name="subject">
                    <option value="organizacion-civil">Organización Civil</option>
                </select>

                <label for="message">Mensaje</label>
                <textarea id="message" name="message" rows="4" required></textarea>

                <button type="submit">LISTO</button>
            </form>
        </section>
        <section class="box contact-info">
            <h1>Nuestros datos</h1>
            <p><label>Email:</label> <a href="mailto:info@queycomo.org">info@queycomo.org</a></p>
            <p><label>Teléfono:</label> <a href="tel:+52552450115">(55) 5245 0115</a></p>
            <p><label>Dirección:</label> Bosque de Duraznos 127-Piso 4, CDMX</p>
            <div class="social-links">
                <label>Nuestras redes:</label>
                <p>
                    <a href="https://www.facebook.com" target="_blank">Facebook</a>
                    <a href="https://www.instagram.com" target="_blank">Instagram</a>
                    <a href="https://www.linkedin.com" target="_blank">LinkedIn</a>
                    <a href="https://www.twitter.com" target="_blank">Twitter</a>
                </p>
            </div>
        </section>
    </div>

</body>
</html>
